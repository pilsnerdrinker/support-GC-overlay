<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P4グランドクロス補助表</title>
  <meta name="description" content="絶妖星乱舞 P4 グランドクロスの1回目/2回目の真偽・デバフ・カオスを入力して、結果タブで行動を確認する補助表です。" />
  <style>
    :root{
      --bg:#f2f2f2;
      --paper:#ffffff;
      --line:#111;
      --empty:#858585;
      --blue:#5f8fe4;
      --blue2:#1e62d0;
      --pink:#f7b7c7;
      --beige:#f7e0bb;
      --green:#bfe9c7;
      --redpale:#ffd1d1;
      --text:#050505;
      --muted:#555;
      --shadow:0 10px 22px rgba(0,0,0,.10);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;}
    body{padding:10px 7px 24px;}
    .app{width:min(470px,100%);margin:0 auto;}
    header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 7px;}
    h1{font-size:18px;margin:0;font-weight:1000;letter-spacing:.02em;}
    .sub{font-size:11px;color:#555;font-weight:800;white-space:nowrap;}
    .links{display:flex;gap:8px;align-items:center;justify-content:flex-start;margin:0 0 8px;font-size:11px;font-weight:800;}
    .links a{color:#555;text-decoration:none}.links a:first-child{border:1px solid #999;border-radius:999px;padding:3px 7px;background:#fff;color:#333}
    .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0 10px;}
    .toolbtn{border:2px solid var(--line);background:#fff;border-radius:0;min-height:38px;font-weight:1000;font-size:14px;cursor:pointer;color:#000;}
    .toolbtn:active{transform:translateY(1px);filter:brightness(.94)}

    .sheet{display:grid;gap:12px;}
    .block{background:#fff;border:0;box-shadow:var(--shadow);padding:0;}
    .tabbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
    .input-panel,.result-panel{display:grid;gap:8px;}
    .input-block,.result-card{padding:8px;border:2px solid #111;box-shadow:var(--shadow);}
    .input-block h2,.result-card h2{margin:0 0 7px;font-size:16px;line-height:1.15;font-weight:1000;}
    .h2-note{font-size:12px;font-weight:1000;color:#444;margin-left:6px;}
    .field-title{margin:8px 0 4px;font-size:12px;font-weight:1000;color:#333;}
    .fixed-note{margin-top:7px;border:2px solid #111;background:#f8f8f8;padding:7px;font-size:13px;line-height:1.35;font-weight:1000;}
    .choice-grid{display:grid;gap:4px;}
    .choice-grid.two{grid-template-columns:1fr 1fr;}
    .choice-grid.three{grid-template-columns:1fr 1fr 1fr;}
    .choice-grid.debuff{grid-template-columns:1fr 1fr 1fr 1fr;}
    .chaos-element-grid{margin-top:6px;}
    .choice-btn{min-height:40px;border:2px solid #111;background:#fff;color:#000;font-weight:1000;font-size:15px;line-height:1.1;cursor:pointer;}
    .choice-btn.active{background:#dff1ff;box-shadow:inset 0 0 0 3px rgba(95,143,228,.35);}
    .choice-btn.true.active{background:#bfefff;}
    .choice-btn.false.active{background:#ffd8d8;}
    .choice-btn:disabled{opacity:.42;cursor:default;}
    .choice-btn:active:not(:disabled){filter:brightness(.94)}
    .icon-choice{display:flex;align-items:center;justify-content:center;gap:5px;padding:2px;}
    .icon-choice .icon{width:28px;height:28px;flex-basis:28px;}
    .icon-choice .icon img{width:28px;height:28px;}
    .result-line{display:grid;grid-template-columns:1fr 1.35fr;gap:4px;margin-top:5px;}
    .result-divider{border-top:2px dashed #777;margin:7px 2px 3px;height:0;}
    .result-main h2{font-size:18px;}
    .result-round + .result-round{border-top:4px solid #111;margin-top:10px;padding-top:10px;}
    .result-round h3{margin:0 0 6px;background:#111;color:#fff;padding:5px 7px;font-size:16px;line-height:1.1;font-weight:1000;text-align:center;}
    .result-subhead{margin:7px 0 2px;background:#eee;border-left:7px solid #111;padding:3px 6px;font-size:13px;font-weight:1000;line-height:1.1;}
    .result-label,.result-action{min-height:38px;border:2px solid #111;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:1000;line-height:1.15;padding:4px;}
    .result-label{gap:5px;}
    .result-label .icon{width:27px;height:27px;flex-basis:27px;}
    .result-label .icon img{width:27px;height:27px;}
    .result-label{background:#fff;font-size:13px;}
    .result-action{font-size:16px;}
    .action.missing{background:#ddd;color:#333;}
    .magic-memo{border-top:4px solid #111;margin-top:10px;padding-top:10px;}
    .magic-memo h3{margin:0 0 6px;background:#111;color:#fff;padding:5px 7px;font-size:16px;line-height:1.1;font-weight:1000;text-align:center;}
    .memo-truth-row{display:grid;grid-template-columns:.72fr 1.7fr;gap:4px;margin-bottom:5px;}
    .memo-truth-spacer{min-height:1px;}
    .memo-truth-guide{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    .memo-truth-box{min-height:34px;border:2px solid #111;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:14px;}
    .memo-grid{display:grid;grid-template-columns:1fr;gap:5px;}
    .memo-row{display:grid;grid-template-columns:.72fr 1.7fr;gap:4px;align-items:stretch;}
    .memo-label{border:2px solid #111;background:#fff;display:flex;align-items:center;justify-content:center;gap:3px;font-size:12px;font-weight:1000;line-height:1.15;padding:3px;text-align:center;}
    .memo-label .icon,.memo-label .icon img{width:22px;height:22px;}
    .memo-label .icon{flex-basis:22px;}
    .memo-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    .memo-choice{min-height:38px;border:2px solid #111;background:#fff;color:#000;font-weight:1000;font-size:14px;line-height:1.12;cursor:pointer;padding:3px;display:flex;align-items:center;justify-content:center;text-align:center;}
    .memo-choice.active.true{background:#eeeeee;box-shadow:inset 0 0 0 3px rgba(80,80,80,.16);}
    .memo-choice.active.false{background:#ffe3b5;box-shadow:inset 0 0 0 3px rgba(220,130,20,.22);}
    .memo-choice:active{filter:brightness(.94)}
    .fast-controls{display:grid;gap:4px;}
    .gc-switch,.truth-switch{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    .gc-tab{min-height:32px;border:2px solid #111;background:#fff;font-weight:1000;font-size:14px;color:#000;cursor:pointer;}
    .gc-tab.active{background:#dff1ff;box-shadow:inset 0 0 0 3px rgba(95,143,228,.35);}
    .gc-tab:active{filter:brightness(.94)}
    .truth-tab{min-height:38px;border:2px solid #111;background:#fff;font-weight:1000;font-size:18px;color:#000;cursor:pointer;}
    .truth-tab.true.selected{background:#bfefff;box-shadow:inset 0 0 0 3px rgba(52,191,232,.30);}
    .truth-tab.false.selected{background:#ffd8d8;box-shadow:inset 0 0 0 3px rgba(229,61,61,.24);}
    .truth-tab:active{filter:brightness(.94)}
    .grid{display:grid;grid-template-columns:1.05fr 1fr 1fr;gap:3px;background:#000;padding:2px;border:2px solid #000;}
    .cell{min-height:49px;background:#fff;border:0;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:1000;font-size:16px;line-height:1.08;position:relative;user-select:none;color:#000;}
    button.cell{cursor:pointer;font:inherit;font-weight:1000;color:#000;padding:0 5px;}
    button.cell:active{filter:brightness(.94)}
    .head{min-height:40px;font-size:21px;letter-spacing:.04em;background:#fff;}
    .round-title{font-size:18px;}
    .boss{display:block;font-size:10px;letter-spacing:0;color:#555;margin-top:2px;font-weight:1000;}
    .truth{gap:8px;}
    .truth.true.selected{background:#bfefff;color:#000;}
    .truth.false.selected{background:#ffd8d8;color:#000;}
    .truth:not(.selected){background:#fff;color:#000;}
    .truth-wrap{display:inline-flex;align-items:center;justify-content:center;gap:8px;}
    .truth-mark{position:relative;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;flex:0 0 20px;}
    .truth-mark.true::before{content:"";width:16px;height:16px;border-radius:50%;background:#8fe7ff;border:2px solid #34bfe8;display:block;}
    .truth-mark.false::before{content:"";width:18px;height:18px;border-radius:50%;background:#e53d3d;display:block;}
    .truth-mark.false::after{content:"?";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#ffe76a;font-size:14px;font-weight:1000;line-height:1;transform:translateY(-0.2px);}
    .label{justify-content:flex-start;padding-left:7px;background:#fff;gap:8px;font-size:19px;}
    .label.active{box-shadow:inset 0 0 0 3px rgba(95,143,228,.35);}
    .label.auto{cursor:default;}
    .label .tag{position:absolute;right:5px;bottom:3px;font-size:10px;color:#222;background:#e9f1ff;border:1px solid #333;padding:1px 4px;font-weight:1000;}
    .icon{width:40px;height:40px;display:inline-grid;place-items:center;line-height:1;flex:0 0 40px;position:relative;}
    .icon img{width:40px;height:40px;object-fit:contain;display:block;filter:drop-shadow(0 1px 1px rgba(0,0,0,.22));}
    .empty{background:var(--empty);color:transparent;}
    .action{font-size:16px;color:#000;}
    @media (max-width:520px){ .truth-wrap{gap:5px;} .truth-mark{width:16px;height:16px;flex-basis:16px;} .truth-mark.true::before{width:12px;height:12px;border-width:1.5px;} .truth-mark.false::before{width:14px;height:14px;} .truth-mark.false::after{font-size:11px;} }
    .action.stack,.action.spread{background:var(--beige)}
    .action.leave{background:var(--redpale)}
    .action.stay{background:#bfefff}
    .action.charge-step{background:#ffe3b5}
    .action.charge-safe{background:#eeeeee}
    .action.gaze{background:var(--pink)}
    .action.accel-stop{background:var(--redpale)}
    .action.accel-move{background:var(--green)}
    .mini .head{min-height:34px;font-size:18px;}
    .grid[data-round] .cell{min-height:54px;}
    .mini .cell{min-height:49px;}
    .mini-title{font-size:16px;}
    .section-gap{height:2px;}

    .summary{background:#fff;border:2px solid #000;margin-top:10px;box-shadow:var(--shadow);padding:8px;}
    .summary-title{font-size:13px;font-weight:1000;margin:0 0 6px;color:#333;}
    .summary-line{font-weight:1000;font-size:15px;line-height:1.5;margin:0;}
    .summary-line .early{color:#0f766e}.summary-line .late{color:#6d28d9}.summary-line .other{color:#7c2d12}.summary-line .missing{color:#b45309}
    .copybox{width:100%;min-height:90px;border:2px solid #111;margin-top:6px;padding:6px;font-size:12px;font-weight:800;resize:vertical;background:#fafafa;color:#111;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    details{margin-top:8px;background:#fff;border:2px solid #111;padding:6px 8px;font-size:12px;line-height:1.6;}
    details summary{font-weight:1000;cursor:pointer;}
    .toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,12px);background:#111;color:#fff;border-radius:999px;padding:8px 14px;font-weight:1000;font-size:13px;opacity:0;transition:.14s;pointer-events:none;z-index:10;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media (max-width:390px){
      body{padding-left:5px;padding-right:5px}.cell{min-height:46px;font-size:15px}.head{min-height:38px;font-size:19px}.round-title{font-size:16px}.label{font-size:17px;padding-left:5px;gap:5px}.icon{width:34px;height:34px;flex-basis:34px}.icon img{width:34px;height:34px}.action{font-size:15px}.sub{display:none}
    }

<body>
  <div class="app">
    <header>
      <h1>P4グランドクロス補助表</h1>
      <div class="head-actions">
        <button class="toolbtn mini-tool" id="resetBtn" type="button">リセット</button>
        <button class="toolbtn mini-tool" id="vibrateBtn" type="button" data-act="setVibration">振動OFF</button>
        <button class="toolbtn mini-tool" id="wakeBtn" type="button">画面ON</button>
      </div>
    </header>
    <div class="links">
      <a href="https://github.com/pilsnerdrinker/practice-grandcross-helper#readme" target="_blank" rel="noopener">README</a>
      <a href="https://pilsnerdrinker.github.io/raidshelf/" target="_blank" rel="noopener">他の練習ページ：raidshelf</a>
    </div>

    <main class="sheet" id="sheet"></main>

    <details>

  const blankGc = () => ({ exTruth:null, debuffKind:null, wlTiming:null, chaosTruth:null });
  const blankState = () => ({
    activeTab:'gc1',
    gc1:{...blankGc(), chaosElement:null},
    gc2:{...blankGc()},
    vibrationEnabled:false,
    magicMemo:{first:null, second:null}
  });
  let state = load();

  const sheet = document.getElementById('sheet');

  const tabDefs = [
    {key:'gc1', label:'1回目GC'},
    {key:'gc2', label:'2回目GC'},
    {key:'result', label:'結果'}
  ];
  const waterLightningTypes = [
    {key:'water', label:'水', icon:'water'},
    {key:'thunder', label:'雷', icon:'thunder'}
  ];
  const debuffChoices = [
    {key:'water', label:'水', icon:'water'},
    {key:'thunder', label:'雷', icon:'thunder'},
    {key:'gaze', label:'視線', icon:'gaze'},
    {key:'accel', label:'加速のみ', icon:'accel'}
  ];
  const timingDefs = [
    {key:'early', label:'早'},
    {key:'late', label:'遅'}
  ];
  const chaosElements = [
    {key:'fire', label:'ほのお', icon:'fire'},
    {key:'wave', label:'みず', icon:'wave'}
  ];

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return blankState();
      const parsed = JSON.parse(raw);
      const base = blankState();
      const activeTab = ['gc1', 'gc2', 'result'].includes(parsed.activeTab) ? parsed.activeTab : 'gc1';
      return {
        ...base,
        ...parsed,
        activeTab,
        vibrationEnabled:parsed.vibrationEnabled === true,
        magicMemo:migrateMagicMemo(base.magicMemo, parsed.magicMemo||{}),
        gc1:migrateGc(base.gc1, parsed.gc1||{}),
        gc2:migrateGc(base.gc2, parsed.gc2||{})
      };
    }catch(e){ return blankState(); }
  }
  function migrateMagicMemo(baseMemo, parsedMemo){
    return {
      first:['真','偽'].includes(parsedMemo.first) ? parsedMemo.first : baseMemo.first,
      second:['真','偽'].includes(parsedMemo.second) ? parsedMemo.second : baseMemo.second
    };
  }
  function migrateGc(baseGc, parsedGc){
    const merged = {...baseGc, ...parsedGc};
    if(parsedGc.debuffType === 'water' || parsedGc.debuffType === 'thunder'){
      merged.debuffKind = parsedGc.debuffType;
      merged.wlTiming = parsedGc.debuffTiming || null;
    }
    if(parsedGc.debuffType === 'accel'){
      merged.debuffKind = 'accel';
    }
    if(parsedGc.wlType === 'water' || parsedGc.wlType === 'thunder'){
      merged.debuffKind = parsedGc.wlType;
    }
    if(parsedGc.accel && !merged.debuffKind){
      merged.debuffKind = 'accel';
    }
    delete merged.debuffType;
    delete merged.debuffTiming;
    delete merged.wlType;
    delete merged.accel;
    delete merged.accelTiming;
    return merged;
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function wlAction(rowKey, truth){
    if(rowKey === 'water') return truth === '真' ? {txt:'頭割り', cls:'stack'} : {txt:'散開', cls:'spread'};
    return truth === '真' ? {txt:'散開', cls:'spread'} : {txt:'頭割り', cls:'stack'};
  }
  function gazeAction(truth){ return truth === '真' ? {txt:'見ない（外）', cls:'gaze'} : {txt:'見る（内）', cls:'gaze'}; }
  function accelAction(truth){ return truth === '真' ? {txt:'止まる', cls:'accel-stop'} : {txt:'動く', cls:'accel-move'}; }
  function chaosAction(rowKey, truth){
    if(rowKey === 'fire') return truth === '真' ? {txt:'離れる', cls:'leave'} : {txt:'中央待機', cls:'stay'};
    return truth === '真' ? {txt:'中央待機', cls:'stay'} : {txt:'離れる', cls:'leave'};
  }
  function magicAction(truth){ return truth === '真' ? {txt:'踏まない', cls:'charge-safe'} : {txt:'踏む', cls:'charge-step'}; }
  function iconHtml(row){ return `<span class="icon"><img src="${ICONS[row.icon]}" alt="" aria-hidden="true"></span>`; }

  function render(){
    sheet.innerHTML = renderTabs() + renderActivePanel();
    save();
  }

  function renderTabs(){
    return `<nav class="tabbar" aria-label="表示切替">
      ${tabDefs.map(tab => `<button class="gc-tab ${state.activeTab === tab.key ? 'active' : ''}" type="button" data-act="setTab" data-tab="${tab.key}">${tab.label}</button>`).join('')}
    </nav>`;
  }

  function renderActivePanel(){
    if(state.activeTab === 'gc2') return renderGcPanel('gc2');
    if(state.activeTab === 'result') return renderResultPanel();
    return renderGcPanel('gc1');
  }

  function renderGcPanel(gcKey){
    const gc = state[gcKey];
    const isFirst = gcKey === 'gc1';
    return `<section class="input-panel">
      <section class="block input-block">
        <h2>${isFirst ? '1回目GC' : '2回目GC'}<span class="h2-note">エクスデス真偽</span></h2>
        <div class="choice-grid two">
          ${renderTruthChoice(gcKey, 'exTruth', '真')}
          ${renderTruthChoice(gcKey, 'exTruth', '偽')}
        </div>
      </section>

      <section class="block input-block">
        <h2>デバフ</h2>
        <div class="choice-grid debuff">
          ${debuffChoices.map(row => renderDebuffKindChoice(gcKey, row)).join('')}
        </div>
        <div class="field-title">水雷の早遅</div>
        <div class="choice-grid two">
          ${timingDefs.map(t => `<button class="choice-btn ${gc.wlTiming === t.key ? 'active' : ''}" type="button" data-act="setWlTiming" data-gc="${gcKey}" data-timing="${t.key}" ${isWaterLightningKind(gc.debuffKind) ? '' : 'disabled'}>${t.label}</button>`).join('')}
        </div>
        ${renderAutoTimingNote(gcKey)}
      </section>

      <section class="block input-block">
        <h2>カオス</h2>
        <div class="choice-grid two">
          ${renderTruthChoice(gcKey, 'chaosTruth', '真')}
          ${renderTruthChoice(gcKey, 'chaosTruth', '偽')}
        </div>
        ${isFirst ? renderFirstChaosElement() : renderSecondChaosElement()}
      </section>
    </section>`;
  }

  function truthLabelHtml(truth){
    const cls = truth === "真" ? "true" : "false";
    return `<span class="truth-wrap"><span class="truth-mark ${cls}" aria-hidden="true"></span><span>${truth}</span><span class="truth-mark ${cls}" aria-hidden="true"></span></span>`;
  }

  function renderTruthChoice(gcKey, field, truth){
    const selected = state[gcKey][field] === truth ? ' active' : '';
    const kind = truth === "真" ? " true" : " false";
    return `<button class="choice-btn truth-choice${kind}${selected}" type="button" data-act="setTruth" data-gc="${gcKey}" data-field="${field}" data-truth="${truth}">${truthLabelHtml(truth)}</button>`;
  }

  function renderDebuffKindChoice(gcKey, row){
    const selected = state[gcKey].debuffKind === row.key ? ' active' : '';
    return `<button class="choice-btn icon-choice${selected}" type="button" data-act="setDebuffKind" data-gc="${gcKey}" data-kind="${row.key}">${iconHtml(row)}<span>${row.label}</span></button>`;
  }

  function renderAutoTimingNote(gcKey){
    return '';
  }

  function renderFirstChaosElement(){
    return `<div class="choice-grid two chaos-element-grid">
        ${chaosElements.map(row => `<button class="choice-btn icon-choice ${state.gc1.chaosElement === row.key ? 'active' : ''}" type="button" data-act="setChaosElement" data-element="${row.key}">${iconHtml(row)}<span>${row.label}</span></button>`).join('')}
      </div>`;
  }

  function renderSecondChaosElement(){
    return '';
  }

  function secondChaosElement(){
    if(state.gc1.chaosElement === 'fire') return 'wave';
    if(state.gc1.chaosElement === 'wave') return 'fire';
    return null;
  }

  function chaosLabel(element){
    return element === 'fire' ? 'ほのお' : element === 'wave' ? 'みず' : '未入力';
  }

  function timingLabel(timing){
    return timing === 'early' ? '早' : timing === 'late' ? '遅' : '未入力';
  }

  function debuffLabel(type){
    const row = waterLightningTypes.find(item => item.key === type);
    return row ? row.label : 'なし';
  }

  function isWaterLightningKind(kind){
    return kind === 'water' || kind === 'thunder';
  }

  function debuffGroup(kind){
    if(isWaterLightningKind(kind)) return '水雷';
    if(kind === 'gaze' || kind === 'accel') return '視線/加速';
    return null;
  }

  function accelTimingFor(gcKey){
    const kind = state[gcKey].debuffKind;
    if(kind === 'gaze') return gcKey === 'gc1' ? 'early' : 'late';
    if(kind === 'accel') return gcKey === 'gc1' ? 'late' : 'early';
    return null;
  }

  function chaosTimingFor(element){
    if(element === 'fire') return 'early';
    if(element === 'wave') return 'late';
    return null;
  }

  function renderResultPanel(){
    return `<section class="result-panel">
      <section class="block result-card result-main">
        <h2>結果</h2>
        ${renderTimingResult('early')}
        ${renderTimingResult('late')}
        ${renderMagicMemo()}
      </section>
      ${renderInputWarnings()}
    </section>`;
  }

  function renderTimingResult(timing){
    const title = timing === 'early' ? '1回目処理（早デバフ）' : '2回目処理（遅デバフ）';
    const lines = [
      ...renderProcessingLinesForTiming(timing),
      ...renderChaosLinesForTiming(timing)
    ];
    return `<section class="result-round">
      <h3>${title}</h3>
      ${lines.join('')}
    </section>`;
  }

  function renderProcessingLinesForTiming(timing){
    const waterLightningLines = [];
    const accelLines = [];
    const gazeLines = [];
    for(const gcKey of ['gc1', 'gc2']){
      const gc = state[gcKey];
      if(isWaterLightningKind(gc.debuffKind) && gc.wlTiming === timing){
        waterLightningLines.push(renderWaterLightningResult(gc, false));
      }
      if(accelTimingFor(gcKey) === timing){
        accelLines.push(renderAccelResult(gcKey, false));
      }
      if((gcKey === 'gc1' && timing === 'early') || (gcKey === 'gc2' && timing === 'late')){
        const action = gc.exTruth ? gazeAction(gc.exTruth) : null;
        gazeLines.push(renderActionLine('視線', action ? action.txt : 'エクスデス真偽を入力', action ? action.cls : 'missing', 'gaze'));
      }
    }
    if(!waterLightningLines.length){
      waterLightningLines.push(renderActionLine('水雷', '集合', 'stack'));
    }
    return [
      ...waterLightningLines,
      ...accelLines,
      ...(gazeLines.length ? [renderResultDivider()] : []),
      ...gazeLines
    ];
  }

  function renderWaterLightningResult(gc, showTiming = true){
    if(!isWaterLightningKind(gc.debuffKind)) return renderActionLine('水雷', 'なし', 'missing');
    if(!gc.wlTiming) return renderActionLine(debuffLabel(gc.debuffKind), '早遅を入力', 'missing', gc.debuffKind);
    const label = `${showTiming ? `${timingLabel(gc.wlTiming)} ` : ''}${debuffLabel(gc.debuffKind)}`;
    if(!gc.exTruth) return renderActionLine(label, 'エクスデス真偽を入力', 'missing', gc.debuffKind);
    const action = wlAction(gc.debuffKind, gc.exTruth);
    return renderActionLine(label, action.txt, action.cls, gc.debuffKind);
  }

  function renderAccelResult(gcKey, showTiming = true){
    const gc = state[gcKey];
    const timing = accelTimingFor(gcKey);
    if(!timing) return renderActionLine('加速度', 'なし', 'missing');
    const label = `${showTiming ? `${timingLabel(timing)} ` : ''}加速度`;
    if(!gc.exTruth) return renderActionLine(label, 'エクスデス真偽を入力', 'missing', 'accel');
    const action = accelAction(gc.exTruth);
    return renderActionLine(label, action.txt, action.cls, 'accel');
  }

  function renderChaosLinesForTiming(timing){
    const lines = [];
    for(const gcKey of ['gc1', 'gc2']){
      const isFirst = gcKey === 'gc1';
      const gc = state[gcKey];
      const element = isFirst ? state.gc1.chaosElement : secondChaosElement();
      if(!element || chaosTimingFor(element) !== timing) continue;
      const title = isFirst ? '1回目' : '2回目';
      if(!gc.chaosTruth){
        lines.push(renderActionLine(`${title} ${chaosLabel(element)}`, 'カオス真偽を入力', 'missing', element));
        continue;
      }
      const action = chaosAction(element, gc.chaosTruth);
      lines.push(renderActionLine(`${title} ${chaosLabel(element)}`, action.txt, action.cls, element));
    }
    return lines;
  }

  function renderMagicMemo(){
    return `<section class="magic-memo">
      <h3>マジックチャージメモ</h3>
      ${renderMagicTruthGuide()}
      <div class="memo-grid">
        <div class="memo-row">
          <div class="memo-label">${iconHtml({icon:'magicThunder'})}<span>1回目<br>（雷）</span></div>
          <div class="memo-choice-grid">
            ${renderMagicMemoChoice('first', '真')}
            ${renderMagicMemoChoice('first', '偽')}
          </div>
        </div>
        <div class="memo-row">
          <div class="memo-label">${iconHtml({icon:'magicIce'})}<span>2回目<br>（氷）</span></div>
          <div class="memo-choice-grid">
            ${renderMagicMemoChoice('second', '真')}
            ${renderMagicMemoChoice('second', '偽')}
          </div>
        </div>
      </div>
    </section>`;
  }

  function renderMagicTruthGuide(){
    return `<div class="memo-truth-row" aria-label="マジックチャージ真偽">
      <div class="memo-truth-spacer" aria-hidden="true"></div>
      <div class="memo-truth-guide">
        <div class="memo-truth-box">${truthLabelHtml('真')}</div>
        <div class="memo-truth-box">${truthLabelHtml('偽')}</div>
      </div>
    </div>`;
  }

  function renderMagicMemoChoice(field, truth){
    const action = magicAction(truth);
    const selected = state.magicMemo[field] === truth ? ' active' : '';
    const kind = truth === '真' ? ' true' : ' false';
    return `<button class="memo-choice${kind}${selected}" type="button" data-act="setMagicMemo" data-memo="${field}" data-truth="${truth}">${action.txt}</button>`;
  }

  function renderInputWarnings(){
    const lines = [];
    for(const gcKey of ['gc1', 'gc2']){
      const gc = state[gcKey];
      const prefix = gcKey === 'gc1' ? '1回目' : '2回目';
      if(isWaterLightningKind(gc.debuffKind) && !gc.wlTiming){
        lines.push(renderActionLine(`${prefix} ${debuffLabel(gc.debuffKind)}`, '早遅を入力', 'missing', gc.debuffKind));
      }
    }
    const group1 = debuffGroup(state.gc1.debuffKind);
    const group2 = debuffGroup(state.gc2.debuffKind);
    if(group1 && group2 && group1 === group2){
      lines.push(renderActionLine('デバフ法則', `1回目/2回目が両方${group1}側`, 'missing'));
    }
    if(!lines.length) return '';
    return `<section class="block result-card">
      <h2>未入力</h2>
      ${lines.join('')}
    </section>`;
  }

  function renderActionLine(label, text, cls, icon){
    const iconPart = icon && ICONS[icon] ? iconHtml({icon}) : '';
    return `<div class="result-line">
      <div class="result-label">${iconPart}<span>${esc(label)}</span></div>
      <div class="result-action action ${cls}">${esc(text)}</div>
    </div>`;
  }

  function renderResultDivider(){
    return `<div class="result-divider" aria-hidden="true"></div>`;
  }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => t.classList.remove('show'), 1000);
  }

  document.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if(!btn) return;
    triggerHaptic();
    const act = btn.dataset.act;
    if(!act || act === 'noop') return;
    if(act === 'setVibration'){
      state.vibrationEnabled = !state.vibrationEnabled;
      save();
      updateVibrateButton();
      if(state.vibrationEnabled){
        triggerHaptic(true);
        if(!('vibrate' in navigator)) toast('このブラウザは振動非対応かも');
      }
      return;
    }
    if(act === 'setTab'){
      state.activeTab = ['gc1', 'gc2', 'result'].includes(btn.dataset.tab) ? btn.dataset.tab : 'gc1';
      render(); return;
    }
    if(act === 'setTruth'){
      const gc = btn.dataset.gc;
      const field = btn.dataset.field;
      if(!state[gc] || !['exTruth', 'chaosTruth'].includes(field)) return;
      state[gc][field] = state[gc][field] === btn.dataset.truth ? null : btn.dataset.truth;
      render(); return;
    }
    if(act === 'setDebuffKind'){
      const gc = btn.dataset.gc;
      if(!state[gc]) return;
      const kind = btn.dataset.kind || null;
      if(kind && !['water', 'thunder', 'gaze', 'accel'].includes(kind)) return;
      state[gc].debuffKind = state[gc].debuffKind === kind ? null : kind;
      if(!isWaterLightningKind(state[gc].debuffKind)) state[gc].wlTiming = null;
      render(); return;
    }
    if(act === 'setWlTiming'){
      const gc = btn.dataset.gc;
      if(!state[gc] || !isWaterLightningKind(state[gc].debuffKind)) return;
      const timing = btn.dataset.timing;
      if(!['early', 'late'].includes(timing)) return;
      state[gc].wlTiming = state[gc].wlTiming === timing ? null : timing;
      render(); return;
    }
    if(act === 'setChaosElement'){
      const element = btn.dataset.element;
      if(!['fire', 'wave'].includes(element)) return;
      state.gc1.chaosElement = state.gc1.chaosElement === element ? null : element;
      render(); return;
    }
    if(act === 'setMagicMemo'){
      const field = btn.dataset.memo;
      const truth = btn.dataset.truth;
      if(!['first', 'second'].includes(field) || !['真', '偽'].includes(truth)) return;
      state.magicMemo[field] = state.magicMemo[field] === truth ? null : truth;
      render(); return;
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    state = blankState();
    render();
    updateVibrateButton();
    toast('リセットしました');
  });

  function triggerHaptic(force = false){
    if(!force && !state.vibrationEnabled) return;
    if(!('vibrate' in navigator)) return;
    try{ navigator.vibrate(24); }catch(e){}
  }

  const vibrateBtn = document.getElementById('vibrateBtn');
  function updateVibrateButton(){
    if(!vibrateBtn) return;
    vibrateBtn.textContent = state.vibrationEnabled ? '振動ON' : '振動OFF';
    vibrateBtn.classList.toggle('vibrate-active', state.vibrationEnabled);
  }


  let wakeLock = null;
  let wakeWanted = false;
  const wakeBtn = document.getElementById('wakeBtn');

  function updateWakeButton(){
    if(!wakeBtn) return;
    wakeBtn.textContent = wakeLock ? '画面ON中' : '画面ON';
    wakeBtn.classList.toggle('wake-active', !!wakeLock);
  }

  async function requestWakeLock(){
    if(!('wakeLock' in navigator)){
      toast('このブラウザは非対応です');
      wakeWanted = false;
      updateWakeButton();
      return;
    }
    try{
      wakeLock = await navigator.wakeLock.request('screen');
      wakeWanted = true;
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        updateWakeButton();
      });
      updateWakeButton();
      toast('画面ONにしました');
    }catch(e){
      wakeLock = null;
      wakeWanted = false;
      updateWakeButton();
      toast('画面ONにできません');
    }
  }

  async function releaseWakeLock(){
    wakeWanted = false;
    if(wakeLock){
      try{ await wakeLock.release(); }catch(e){}
      wakeLock = null;
    }
    updateWakeButton();
    toast('画面ONを解除しました');
  }

  if(wakeBtn){
    wakeBtn.addEventListener('click', () => {
      if(wakeLock) releaseWakeLock();
      else requestWakeLock();
    });
  }

  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible' && wakeWanted && !wakeLock){
      requestWakeLock();
    }
  });

  render();
  updateVibrateButton();
  updateWakeButton();
})();
</script>
